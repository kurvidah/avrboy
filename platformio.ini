; PlatformIO Project Configuration File
; Unified AVRboy Environment (16MHz External Crystal)

[env:ATmega328P]
platform = atmelavr
board = ATmega328P
board_build.f_cpu = 16000000L

; Unified ISP Upload via USBasp
upload_protocol = usbasp
upload_flags =
    -e
    -Ulfuse:w:0xFF:m
    -Uhfuse:w:0xDB:m
    -Uefuse:w:0x05:m

monitor_speed = 9600

build_flags = 
    -D DEBUG
    -Wl,--section-start=.system_api=0x2FC0
    -Wl,--section-start=.bootloader=0x7000
